
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARKON | المستشار الكمي للتداول</title>
    <script>
        // كتم تنبيه Tailwind Play CDN للحفاظ على نظافة الكونسول
        (function() {
            const originalWarn = console.warn;
            console.warn = function(...args) {
                if (args[0] && typeof args[0] === 'string' && args[0].includes('cdn.tailwindcss.com')) {
                    return;
                }
                originalWarn.apply(console, args);
            };
        })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
        
        :root {
            --glass-bg: rgba(13, 13, 18, 0.7);
            --glass-border: rgba(255, 255, 255, 0.05);
            --accent-primary: #6366f1;
        }

        body { 
            font-family: 'IBM Plex Sans Arabic', sans-serif; 
            background-color: #050507; 
            color: #f4f4f5;
            margin: 0;
            overflow-x: hidden;
        }

        .mesh-gradient {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(168, 85, 247, 0.1) 0%, transparent 50%);
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        .glass-card { 
            background: var(--glass-bg); 
            border: 1px solid var(--glass-border); 
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        .glass-card:hover { border-color: rgba(99, 102, 241, 0.2); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #050507; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.39.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div class="mesh-gradient"></div>
    <div id="root"></div>
    <!-- هذا السطر هو المحرك الأساسي الذي كان مفقوداً -->
    <script type="module" src="/index.tsx"></script>
</body>
</html>
